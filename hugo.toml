baseURL = 'https://tonyscookbook.com/'
languageCode = 'en-us'
title = "Tony's Cookbook"
theme = 'PaperMod'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[params]
hideSummary = false
ShowLanguageSwitcher = true

[languages]
	[languages.en]
	languageName = "English"
	languageCode = "en-us"
	weight = 1

		[languages.en.menu]
			[[languages.en.menu.main]]
			identifier = "about"
			name = "About"
			url = "/about/"
			weight = 10

			[[languages.en.menu.main]]
			identifier = "telegram"
			name = "Telegram"
			url = "https://t.me/tonyscookbook"
			weight = 20


	[languages.uk]
	languageName = "Українська"
	languageCode = "uk-ua"
	weight = 2

		[languages.uk.menu]
			[[languages.uk.menu.main]]
			identifier = "about"
			name = "Про мене"
			url = "/uk/about/"
			weight = 10

			[[languages.uk.menu.main]]
			identifier = "telegram"
			name = "Telegram"
			url = "https://t.me/tonyscookbook"
			weight = 20


[caches]
  [caches.images]
    dir = ':cacheDir/images'
